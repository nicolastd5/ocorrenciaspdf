<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Painel — Processador de Ocorrências{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c1220; --surface:#111a2e; --surface-2:#1a2540; --border:#273450;
  --text:#c9d4e6; --text-bright:#f0f6fc; --text-muted:#8b95a7;
  --accent:#58a6ff; --blue:#1f6feb; --green:#3fb950; --green-dark:#238636;
  --red:#f85149; --amber:#e3b341;
  --grad:linear-gradient(135deg,#1f6feb,#238636);
  --grad-soft:linear-gradient(135deg,#388bfd,#2ea043);
  --radius:14px; --radius-sm:9px;
  --font:'Inter','Segoe UI',system-ui,sans-serif;
  --mono:'JetBrains Mono','Cascadia Mono',Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font); color:var(--text); background:var(--bg); font-size:14px;
  background-image:
    radial-gradient(900px 500px at 85% -10%, rgba(31,111,235,.13), transparent 60%),
    radial-gradient(700px 420px at -10% 105%, rgba(35,134,54,.10), transparent 60%);
  background-attachment:fixed; min-height:100vh;
}
a{color:var(--accent)}

/* ---------- shell ---------- */
.shell{display:flex;min-height:100vh}
.sidebar{
  width:232px;flex-shrink:0;display:flex;flex-direction:column;gap:4px;
  padding:18px 14px;border-right:1px solid var(--border);
  background:rgba(17,26,46,.65);backdrop-filter:blur(6px);
  position:sticky;top:0;height:100vh;
}
.brand{display:flex;align-items:center;gap:11px;padding:4px 6px 16px}
.brand-logo{
  width:34px;height:34px;border-radius:9px;background:var(--grad);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:17px;font-weight:700;
  box-shadow:0 4px 14px rgba(31,111,235,.35);
}
.brand-name{font-size:12.5px;font-weight:600;color:var(--text-bright);line-height:1.25}
.sidebar nav{display:flex;flex-direction:column;gap:2px}
.sidebar nav a{
  display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:8px;
  color:var(--text);text-decoration:none;font-weight:500;font-size:13.5px;
  border:1px solid transparent;
}
.sidebar nav a svg{width:16px;height:16px;color:var(--text-muted);flex-shrink:0}
.sidebar nav a:hover{background:var(--surface-2)}
.sidebar nav a.active{background:var(--surface-2);color:var(--text-bright);border-color:var(--border)}
.sidebar nav a.active svg{color:var(--accent)}
.sidebar .spacer{flex:1}
.logout button{
  width:100%;display:flex;align-items:center;gap:10px;padding:9px 11px;
  background:transparent;border:1px solid transparent;border-radius:8px;
  color:var(--text-muted);font-family:var(--font);font-size:13.5px;cursor:pointer;
}
.logout button:hover{background:var(--surface-2);color:var(--text)}
main{flex:1;padding:34px 38px;max-width:1180px}

/* ---------- header ---------- */
.page-header{margin-bottom:24px}
.page-header h1{font-size:23px;font-weight:700;color:var(--text-bright);letter-spacing:-.02em}
.page-header h2{font-size:16px;font-weight:600;color:var(--text-bright);margin-bottom:10px}
.page-header p{color:var(--text-muted);margin-top:4px;font-size:13.5px}

/* ---------- cards / kpi ---------- */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;
}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.kpi .label{font-size:11.5px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.kpi .value{font-family:var(--mono);font-size:26px;font-weight:700;color:var(--text-bright);margin-top:6px}
.kpi .value.ok{color:var(--green)} .kpi .value.warn{color:var(--amber)}
.kpi .value.accent{color:var(--accent)} .kpi .value.danger{color:var(--red)}
.kpi .sub{font-size:11.5px;color:var(--text-muted);margin-top:4px}

/* ---------- tables ---------- */
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{
  text-align:left;padding:11px 16px;background:var(--surface-2);color:var(--text-muted);
  font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  border-bottom:1px solid var(--border);
}
td{padding:11px 16px;border-bottom:1px solid rgba(39,52,80,.55);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(88,166,255,.045)}
td.empty{text-align:center;color:var(--text-muted);padding:34px}
.meta{color:var(--text-muted);font-size:12.5px}
.key{font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:.02em}

/* ---------- badges ---------- */
.badge{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.badge-active{color:var(--green);background:rgba(63,185,80,.12);border:1px solid rgba(63,185,80,.3)}
.badge-revoked{color:var(--red);background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3)}

/* ---------- buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:8px 16px;border-radius:var(--radius-sm);
  font-family:var(--font);font-size:13.5px;font-weight:600;cursor:pointer;text-decoration:none;
  border:1px solid var(--border);background:var(--surface-2);color:var(--text);
}
.btn:hover{border-color:var(--text-muted)}
.btn-primary{background:var(--grad);border:none;color:#fff;box-shadow:0 3px 12px rgba(31,111,235,.3)}
.btn-primary:hover{background:var(--grad-soft)}
.btn-danger{background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.35);color:var(--red)}
.btn-danger:hover{background:rgba(248,81,73,.2)}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted)}
.btn-ghost:hover{color:var(--text);background:var(--surface-2)}
.btn-sm{padding:5px 11px;font-size:12.5px}
.inline{display:inline}

/* ---------- forms ---------- */
label{display:block;font-size:12.5px;font-weight:600;color:var(--text-bright);margin:14px 0 6px}
input[type=text],input[type=password],input[type=file],textarea,select{
  width:100%;padding:9px 12px;border-radius:var(--radius-sm);font-family:var(--font);font-size:13.5px;
  background:var(--bg);border:1px solid var(--border);color:var(--text-bright);outline:none;
}
input:focus,textarea:focus,select:focus{border-color:var(--accent)}
textarea{min-height:84px;resize:vertical}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;max-width:640px}
.form-actions{display:flex;gap:10px;margin-top:20px}
.hint{font-size:12.5px;color:var(--text-muted);margin-top:6px;line-height:1.55}
.check{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;color:var(--text)}
.check input{width:auto}

/* ---------- alerts / toolbar / info ---------- */
.alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13.5px;margin-bottom:18px}
.alert-success{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.35);color:var(--green)}
.alert-error{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.35);color:var(--red)}
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.toolbar form{display:flex;gap:10px;flex:1;min-width:280px}
.toolbar input[type=text]{flex:1}
.toolbar select{width:auto}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:22px}
.info-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px}
.info-label{font-size:11.5px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.info-value{color:var(--text-bright);font-size:14px}

/* ---------- login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{
  width:380px;background:linear-gradient(135deg,#0e1626,#0d1117 50%,#11203a);
  border:1px solid var(--border);border-radius:18px;padding:38px 34px;
  box-shadow:0 18px 60px rgba(0,0,0,.5);text-align:center;
}
.login-card .brand-logo{width:56px;height:56px;border-radius:14px;font-size:26px;margin:0 auto 18px}
.login-card h1{font-size:18px;color:var(--text-bright);letter-spacing:-.01em}
.login-card p{color:var(--text-muted);font-size:13px;margin:6px 0 18px}
.login-card form{text-align:left}

/* ---------- progress ---------- */
.progress{height:8px;background:var(--surface-2);border:1px solid var(--border);border-radius:5px;overflow:hidden}
.progress .bar{height:100%;width:0%;background:var(--grad);border-radius:5px;transition:width .15s ease}

/* ---------- release hero ---------- */
.release-hero{
  display:flex;align-items:center;gap:20px;padding:20px 24px;margin-bottom:22px;
  background:linear-gradient(135deg,rgba(31,111,235,.12),rgba(35,134,54,.10));
  border:1px solid var(--border);border-radius:var(--radius);flex-wrap:wrap;
}
.release-hero .ver{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--text-bright)}
.release-hero .meta-col{display:flex;flex-direction:column;gap:3px}
.mono{font-family:var(--mono);font-size:12px}
</style>
</head>
<body>
{% block layout %}
{% set path = request.url.path %}
{% set seg2 = path.split('/')[2] if path.split('/')|length > 2 else '' %}
<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">▣</div>
      <div class="brand-name">Processador<br>de Ocorrências</div>
    </div>
    <nav>
      <a href="/admin" class="{{ 'active' if path == '/admin' or path == '/admin/' else '' }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
        Dashboard
      </a>
      <a href="/admin/licenses" class="{{ 'active' if seg2 == 'licenses' or seg2 == 'new' or seg2.isdigit() else '' }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        Licenças
      </a>
      <a href="/admin/releases" class="{{ 'active' if seg2 == 'releases' else '' }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        Releases
      </a>
      <a href="/admin/config" class="{{ 'active' if seg2 == 'config' else '' }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Configurações
      </a>
    </nav>
    <div class="spacer"></div>
    <form method="post" action="/admin/logout" class="logout">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <button type="submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
    </form>
  </aside>
  <main>{% block content %}{% endblock %}</main>
</div>
{% endblock %}
</body>
</html>
