<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}License Manager{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0b12;
            --bg-2:      #0e1019;
            --surface:   #14161f;
            --surface-2: #1a1d29;
            --surface-3: #232735;
            --border:    #262a3a;
            --border-2:  #353a52;

            --text:        #e6e8f0;
            --text-2:      #b4b8cc;
            --text-muted:  #6e7591;
            --text-bright: #ffffff;

            --accent:        #7c6ff5;
            --accent-soft:   #6a5de3;
            --accent-light:  #b5acff;
            --accent-glow:   rgba(124, 111, 245, 0.4);
            --accent-faded:  rgba(124, 111, 245, 0.08);

            --success:    #4ade80;
            --success-bg: rgba(74, 222, 128, 0.10);
            --danger:     #f87171;
            --danger-bg:  rgba(248, 113, 113, 0.10);

            --font:  'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --font-mono: 'JetBrains Mono', 'SFMono-Regular', Consolas, monospace;

            --radius:    10px;
            --radius-sm: 6px;
        }

        html, body { min-height: 100vh; }
        body {
            background:
                radial-gradient(ellipse 1000px 500px at 20% 0%, rgba(124, 111, 245, 0.12), transparent 60%),
                radial-gradient(ellipse 800px 600px at 100% 100%, rgba(181, 172, 255, 0.04), transparent 70%),
                var(--bg);
            font-family: var(--font);
            color: var(--text);
            font-size: 13px;
            line-height: 1.5;
            display: flex;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            font-feature-settings: 'cv11', 'ss01';
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 240px;
            min-height: 100vh;
            background:
                linear-gradient(180deg, rgba(124, 111, 245, 0.05), transparent 200px),
                var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 24px 14px;
            flex-shrink: 0;
        }

        .sidebar-logo {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-bright);
            letter-spacing: -0.01em;
            margin: 4px 8px 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-logo-icon {
            width: 32px; height: 32px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            color: #fff;
            box-shadow: 0 0 18px -4px var(--accent-glow), 0 0 0 1px rgba(255,255,255,0.1) inset;
        }
        .sidebar-logo-icon svg { width: 18px; height: 18px; }

        .sidebar nav { display: flex; flex-direction: column; gap: 2px; flex: 1; }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 11px;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: background 0.12s, color 0.12s;
            position: relative;
        }

        .nav-link:hover { background: var(--surface-2); color: var(--text); }
        .nav-link.active {
            background: var(--accent-faded);
            color: var(--accent-light);
            font-weight: 600;
            box-shadow: inset 0 0 0 1px rgba(124, 111, 245, 0.2);
        }
        .nav-link.active::before {
            content: '';
            position: absolute;
            left: -14px;
            top: 8px; bottom: 8px;
            width: 3px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }

        .sidebar-bottom { margin-top: auto; }

        .btn-logout {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--radius-sm);
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.12s, color 0.12s, border-color 0.12s;
        }
        .btn-logout:hover {
            background: var(--danger-bg);
            color: var(--danger);
            border-color: rgba(248, 113, 113, 0.3);
        }
        .btn-logout svg { width: 16px; height: 16px; }

        /* ── Main ── */
        .main {
            flex: 1;
            padding: 36px 44px 60px;
            max-width: 1140px;
        }
        /* Quando não há sidebar (ex.: tela de login), main ocupa toda a largura */
        body > main:first-child {
            max-width: none;
            padding: 0;
            display: flex;
        }
        .page-header { margin-bottom: 28px; }
        .page-header h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-bright);
            line-height: 1.15;
            letter-spacing: -0.02em;
        }
        .page-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-bright);
            letter-spacing: -0.01em;
        }
        .page-header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 6px;
        }
        .eyebrow {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 500;
        }

        /* ── Alerts ── */
        .alert {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .alert-success {
            background:
                linear-gradient(90deg, rgba(74, 222, 128, 0.12), rgba(74, 222, 128, 0.03)),
                var(--surface);
            border: 1px solid rgba(74, 222, 128, 0.3);
            color: var(--success);
        }
        .alert-error {
            background:
                linear-gradient(90deg, rgba(248, 113, 113, 0.12), rgba(248, 113, 113, 0.03)),
                var(--surface);
            border: 1px solid rgba(248, 113, 113, 0.3);
            color: var(--danger);
        }

        /* ── Card ── */
        .card {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.02), transparent 70%),
                var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 0 0 auto 0;
            height: 1px;
            border-radius: var(--radius) var(--radius) 0 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            pointer-events: none;
        }

        table { width: 100%; border-collapse: collapse; }
        thead {
            background: linear-gradient(180deg, var(--surface-2), var(--surface));
        }
        th {
            padding: 13px 18px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 14px 18px;
            font-size: 13px;
            border-top: 1px solid var(--border);
            vertical-align: middle;
        }
        tbody tr { transition: background 0.12s; }
        tbody tr:hover {
            background: linear-gradient(90deg, var(--accent-faded), transparent 80%);
        }

        .key {
            font-family: var(--font-mono);
            background: var(--bg-2);
            border: 1px solid var(--border);
            padding: 4px 9px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent-light);
            letter-spacing: 0.04em;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 11px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: -0.005em;
        }
        .badge-active {
            background: var(--success-bg);
            color: var(--success);
            box-shadow: inset 0 0 0 1px rgba(74, 222, 128, 0.2);
        }
        .badge-active::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--success);
        }
        .badge-revoked {
            background: var(--danger-bg);
            color: var(--danger);
            box-shadow: inset 0 0 0 1px rgba(248, 113, 113, 0.2);
        }
        .badge-revoked::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--danger);
            border-radius: 50%;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            border: 0;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            transition: all 0.12s;
        }
        .btn:active { transform: translateY(1px); }
        .btn-primary {
            background: linear-gradient(180deg, var(--accent), var(--accent-soft));
            color: #fff;
            font-weight: 600;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.12) inset,
                0 0 0 1px var(--accent),
                0 4px 14px -4px var(--accent-glow);
        }
        .btn-primary:hover {
            filter: brightness(1.1);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.12) inset,
                0 0 0 1px var(--accent-light),
                0 6px 18px -4px var(--accent-glow);
        }
        .btn-danger {
            background: linear-gradient(180deg, var(--danger), #d65454);
            color: #fff;
            font-weight: 600;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.12) inset,
                0 4px 14px -4px rgba(248, 113, 113, 0.4);
        }
        .btn-danger:hover { filter: brightness(1.1); }
        .btn-ghost {
            background: var(--surface-2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--surface-3); border-color: var(--border-2); }

        /* ── Forms ── */
        .form-card {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.02), transparent 70%),
                var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 520px;
            position: relative;
        }
        .form-card::before {
            content: '';
            position: absolute;
            inset: 0 0 auto 0;
            height: 1px;
            border-radius: var(--radius) var(--radius) 0 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 7px;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        label:first-child { margin-top: 0; }

        input[type=text], input[type=password], textarea {
            width: 100%;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.12s, box-shadow 0.12s;
        }
        input[type=text]:focus, input[type=password]:focus, textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124, 111, 245, 0.15);
        }
        textarea { resize: vertical; min-height: 90px; font-family: var(--font); }
        .form-actions { margin-top: 26px; display: flex; gap: 12px; }
        form.inline { display: inline; }

        /* ── Login page ── */
        .login-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-height: 100vh;
            padding: 24px;
        }
        .login-card {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.03), transparent 70%),
                var(--surface);
            border: 1px solid var(--border-2);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            position: relative;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.04) inset,
                0 30px 60px -20px rgba(0, 0, 0, 0.7),
                0 0 80px -20px var(--accent-glow);
        }
        .login-card::before {
            content: '';
            position: absolute;
            inset: 0 0 auto 0;
            height: 1px;
            border-radius: 16px 16px 0 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
        }
        .login-logo {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            color: #fff;
            box-shadow: 0 0 24px -4px var(--accent-glow), 0 0 0 1px rgba(255,255,255,0.1) inset;
            margin-bottom: 18px;
        }
        .login-logo svg { width: 22px; height: 22px; }
        .login-card h1 {
            font-size: 22px;
            margin: 0 0 6px 0;
            color: var(--text-bright);
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .login-card p {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0 0 28px 0;
        }

        /* ── Info grid (detail page + version card) ── */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
            margin-bottom: 32px;
        }
        .info-item {
            background:
                linear-gradient(180deg, rgba(255,255,255,0.02), transparent 70%),
                var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            position: relative;
        }
        .info-item::before {
            content: '';
            position: absolute;
            inset: 0 0 auto 0;
            height: 1px;
            border-radius: var(--radius) var(--radius) 0 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
        }
        .info-item .info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }
        .info-item .info-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
        }

        /* ── Toolbar (above table) ── */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            gap: 16px;
            flex-wrap: wrap;
        }

        /* ── Misc ── */
        .meta {
            color: var(--text-muted);
            font-size: 12px;
            font-family: var(--font-mono);
            font-variant-numeric: tabular-nums;
        }
        .empty {
            text-align: center;
            color: var(--text-muted);
            padding: 60px !important;
            font-size: 14px;
        }
    </style>
</head>
<body>
{% if request.session.get("admin_authenticated") %}
<aside class="sidebar">
    <div class="sidebar-logo">
        <span class="sidebar-logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
        </span>
        License Manager
    </div>
    {% set _path = request.url.path %}
    <nav>
        <a href="/admin" class="nav-link{% if _path == '/admin' or _path.startswith('/admin/') and not _path in ['/admin/new', '/admin/config'] %} active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            Licenças
        </a>
        <a href="/admin/new" class="nav-link{% if _path == '/admin/new' %} active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Nova licença
        </a>
        <a href="/admin/config" class="nav-link{% if _path == '/admin/config' %} active{% endif %}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Configurações
        </a>
    </nav>
    <div class="sidebar-bottom">
        <form method="post" action="/admin/logout">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button class="btn-logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Sair
            </button>
        </form>
    </div>
</aside>
{% endif %}
<main class="main">
    {% block content %}{% endblock %}
</main>
</body>
</html>
