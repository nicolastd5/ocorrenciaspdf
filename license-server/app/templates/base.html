<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}License Manager{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3250;
            --accent: #6c63ff;
            --accent-hover: #5a52e0;
            --danger: #e05252;
            --danger-hover: #c43e3e;
            --success: #4caf82;
            --text: #e2e4f0;
            --text-muted: #7b82a8;
            --key-bg: #1e2235;
            --radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            min-height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            flex-shrink: 0;
        }

        .sidebar-logo {
            font-size: 1rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: .5px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .sidebar-logo svg { width: 22px; height: 22px; }

        .sidebar nav { display: flex; flex-direction: column; gap: .25rem; flex: 1; }

        .nav-link {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .6rem .8rem;
            border-radius: var(--radius);
            color: var(--text-muted);
            text-decoration: none;
            font-size: .9rem;
            transition: background .15s, color .15s;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--surface2);
            color: var(--text);
        }

        .nav-link svg { width: 16px; height: 16px; flex-shrink: 0; }

        .sidebar-bottom { margin-top: auto; }

        .btn-logout {
            width: 100%;
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .6rem .8rem;
            border-radius: var(--radius);
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: .9rem;
            cursor: pointer;
            transition: background .15s, color .15s;
        }

        .btn-logout:hover { background: var(--surface2); color: var(--danger); border-color: var(--danger); }
        .btn-logout svg { width: 16px; height: 16px; }

        /* ── Main ── */
        .main {
            flex: 1;
            padding: 2rem 2.5rem;
            max-width: 1100px;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text);
        }

        .page-header p {
            color: var(--text-muted);
            font-size: .9rem;
            margin-top: .3rem;
        }

        /* ── Alerts ── */
        .alert {
            padding: .75rem 1rem;
            border-radius: var(--radius);
            font-size: .9rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .alert-success { background: #1a2e28; border: 1px solid var(--success); color: var(--success); }
        .alert-error   { background: #2e1a1a; border: 1px solid var(--danger);  color: var(--danger); }

        /* ── Table ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }

        thead { background: var(--surface2); }

        th {
            padding: .75rem 1rem;
            font-size: .78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-muted);
            text-align: left;
        }

        td {
            padding: .75rem 1rem;
            font-size: .9rem;
            border-top: 1px solid var(--border);
            vertical-align: middle;
        }

        tbody tr:hover { background: var(--surface2); }

        .key {
            font-family: "SFMono-Regular", "Consolas", monospace;
            background: var(--key-bg);
            border: 1px solid var(--border);
            padding: .2em .5em;
            border-radius: 4px;
            font-size: .82rem;
            color: #a9b1d6;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: .3em;
            padding: .25em .65em;
            border-radius: 99px;
            font-size: .78rem;
            font-weight: 600;
        }

        .badge-active  { background: #1a2e28; color: var(--success); }
        .badge-revoked { background: #2e1a1a; color: var(--danger); }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: .4em;
            padding: .4em .9em;
            border-radius: var(--radius);
            border: none;
            cursor: pointer;
            font-size: .85rem;
            font-weight: 500;
            text-decoration: none;
            transition: background .15s;
        }

        .btn-primary  { background: var(--accent);  color: #fff; }
        .btn-primary:hover  { background: var(--accent-hover); }
        .btn-danger   { background: var(--danger);  color: #fff; }
        .btn-danger:hover   { background: var(--danger-hover); }
        .btn-ghost    { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-ghost:hover    { background: var(--border); }

        /* ── Forms ── */
        .form-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            max-width: 480px;
        }

        label {
            display: block;
            font-size: .85rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: .4rem;
            margin-top: 1.2rem;
        }

        label:first-child { margin-top: 0; }

        input[type=text], input[type=password], textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: .95rem;
            padding: .55rem .75rem;
            outline: none;
            transition: border-color .15s;
        }

        input[type=text]:focus, input[type=password]:focus, textarea:focus {
            border-color: var(--accent);
        }

        textarea { resize: vertical; min-height: 80px; }

        .form-actions { margin-top: 1.5rem; display: flex; gap: .75rem; }

        form.inline { display: inline; }

        /* ── Login page ── */
        .login-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            background: var(--bg);
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 380px;
        }

        .login-card h1 {
            font-size: 1.3rem;
            margin-bottom: .4rem;
        }

        .login-card p {
            color: var(--text-muted);
            font-size: .875rem;
            margin-bottom: 1.8rem;
        }

        /* ── Detail info grid ── */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .info-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
        }

        .info-item .info-label {
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--text-muted);
            margin-bottom: .35rem;
        }

        .info-item .info-value {
            font-size: .95rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
{% if request.session.get("admin_authenticated") %}
<aside class="sidebar">
    <div class="sidebar-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        License Manager
    </div>
    <nav>
        <a href="/admin" class="nav-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            Licenças
        </a>
        <a href="/admin/new" class="nav-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Nova licença
        </a>
        <a href="/admin/config" class="nav-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Configurações
        </a>
    </nav>
    <div class="sidebar-bottom">
        <form method="post" action="/admin/logout">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button class="btn-logout">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Sair
            </button>
        </form>
    </div>
</aside>
{% endif %}
<main class="main">
    {% block content %}{% endblock %}
</main>
</body>
</html>
