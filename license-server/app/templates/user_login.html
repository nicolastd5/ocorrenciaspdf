<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Processador de Ocorrências</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c1220; --surface:#111a2e; --surface-2:#1a2540; --border:#273450;
  --text:#c9d4e6; --text-bright:#f0f6fc; --text-muted:#8b95a7;
  --accent:#58a6ff; --blue:#1f6feb; --green:#3fb950; --green-dark:#238636;
  --red:#f85149; --amber:#e3b341;
  --grad:linear-gradient(135deg,#1f6feb,#238636);
  --radius:14px; --radius-sm:9px;
  --font:'Inter','Segoe UI',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font); color:var(--text); background:var(--bg); font-size:14px;
  min-height:100vh;
  background-image:
    radial-gradient(900px 500px at 85% -10%, rgba(31,111,235,.13), transparent 60%),
    radial-gradient(700px 420px at -10% 105%, rgba(35,134,54,.10), transparent 60%);
  background-attachment:fixed;
}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.login-card{
  width:400px;background:linear-gradient(135deg,#0e1626,#0d1117 50%,#11203a);
  border:1px solid var(--border);border-radius:18px;padding:42px 36px;
  box-shadow:0 18px 60px rgba(0,0,0,.5);text-align:center;
}
.brand-logo{
  width:56px;height:56px;border-radius:14px;
  background:linear-gradient(135deg,#1f6feb,#238636);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:26px;font-weight:700;margin:0 auto 18px;
  box-shadow:0 4px 14px rgba(31,111,235,.35);
}
.login-card h1{font-size:20px;color:var(--text-bright);letter-spacing:-.01em}
.login-card p{color:var(--text-muted);font-size:13.5px;margin:6px 0 22px}
.login-card form{text-align:left}
label{display:block;font-size:12.5px;font-weight:600;color:var(--text-bright);margin:14px 0 6px}
input[type=email],input[type=password]{
  width:100%;padding:10px 14px;border-radius:9px;font-family:var(--font);font-size:14px;
  background:var(--bg);border:1px solid var(--border);color:var(--text-bright);outline:none;
}
input:focus{border-color:var(--accent)}
.form-actions{display:flex;gap:10px;margin-top:22px}
.btn{
  display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:9px;
  font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;
  border:none;
}
.btn-primary{background:linear-gradient(135deg,#1f6feb,#238636);color:#fff;width:100%;justify-content:center;box-shadow:0 3px 12px rgba(31,111,235,.3)}
.btn-primary:hover{background:linear-gradient(135deg,#388bfd,#2ea043)}
.alert{padding:12px 16px;border-radius:9px;font-size:13px;margin-bottom:18px;text-align:left}
.alert-error{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.35);color:var(--red)}
</style>
</head>
<body>
<div class="login-wrap">
    <div class="login-card">
        <div class="brand-logo">▣</div>
        <h1>Processador de Ocorrências</h1>
        <p>Faça login para acessar a plataforma.</p>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="post" action="/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" autofocus placeholder="seu@email.com" required>
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Entrar</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
