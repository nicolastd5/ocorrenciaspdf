{% extends "base.html" %}
{% block title %}Login — Processador de Ocorrências{% endblock %}
{% block layout %}
<div class="login-wrap">
    <div class="login-card">
        <div class="brand-logo">▣</div>
        <h1>Processador de Ocorrências</h1>
        <p>Painel de administração — faça login para continuar.</p>
        {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
        <form method="post" action="/admin/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" autofocus placeholder="••••••••">
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">Entrar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
