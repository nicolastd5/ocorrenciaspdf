{% extends "base.html" %}
{% block title %}Login — License Manager{% endblock %}
{% block content %}
<div class="login-wrap">
    <div class="login-card">
        <h1>License Manager</h1>
        <p>Faça login para acessar o painel.</p>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/admin/login">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <label for="password">Senha</label>
            <input type="password" id="password" name="password" autofocus placeholder="••••••••">
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">Entrar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
