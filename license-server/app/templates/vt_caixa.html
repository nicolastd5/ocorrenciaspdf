{% extends "app_base.html" %}
{% block title %}VT-Caixa — Processador de Ocorrências{% endblock %}
{% block content %}
<div class="page-header">
    <h1>VT-Caixa</h1>
    <p>Geração de arquivo CSV de Vale-Transporte a partir de fonte (PDF/Excel) e cadastro funcional.</p>
</div>
<div class="form-card">
    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}
    <form method="post" action="/app/vt-caixa" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <label for="fonte" data-tour="vt-fonte">Fonte (relatório Nautilus — PDF ou Excel)</label>
        <input type="file" id="fonte" name="fonte" accept=".pdf,.xlsx,.xls" required>

        <label for="cadastral" data-tour="vt-cadastral">Cadastro funcional (.xlsx/.xls)</label>
        <input type="file" id="cadastral" name="cadastral" accept=".xlsx,.xls" required>

        <div class="form-actions">
            <button type="submit" data-tour="vt-processar" class="btn btn-primary" style="width:100%;justify-content:center">
                Processar
            </button>
        </div>
    </form>
</div>
{% endblock %}
